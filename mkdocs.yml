site_name: Ghostbit
site_url: https://docs.ghostbit.dev
site_description: Self-hosted, end-to-end encrypted paste service
site_author: StackOps HQ
repo_url: https://github.com/stackopshq/ghostbit
repo_name: stackopshq/ghostbit
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: custom
    accent: custom
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - assets/stylesheets/theme.css

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Configuration: configuration.md
  - CLI:  cli.md
  - API: api.md
  - Encryption: encryption.md
  - Self-hosting: self-hosting.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stackopshq/ghostbit
