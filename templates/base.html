<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ghostbit{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>
    // crypto.subtle requires a Secure Context. Browsers grant it to 'localhost'
    // but NOT '127.0.0.1'. Redirect immediately before anything else loads.
    if (location.hostname === '127.0.0.1') {
      location.replace(location.href.replace('127.0.0.1', 'localhost'));
    }
  </script>
</head>
<body class="fade-in">
  <header>
    <a href="/" class="logo">
      <img src="/static/logo.png" alt="Ghostbit">
      ghostbit
    </a>
    <div class="header-actions">
      {% block header_actions %}
      <a href="/api" class="btn-new" style="opacity:0.6;">API</a>
      <a href="/" class="btn-new">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New paste
      </a>
      {% endblock %}
      <a href="https://github.com/stackopshq/ghostbit" class="btn-new" target="_blank" rel="noopener" aria-label="GitHub" style="opacity:0.6; display:flex; align-items:center; gap:5px;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
        GitHub
      </a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="icon-sun">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </span>
        <span class="icon-moon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </span>
      </button>
    </div>
  </header>

  {% block page %}{% endblock %}

  <script>
    // ── GitHub star count ─────────────────────────────────────────────────────
    (function() {
      const el    = document.getElementById('starCount');
      const key   = 'gb_stars';
      const tsKey = 'gb_stars_ts';
      const TTL   = 3600 * 1000; // 1h cache

      function fmt(n) {
        return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : String(n);
      }

      function show(n) {
        if (!el || n == null) return;
        el.textContent = fmt(n);
        el.style.display = 'inline';
      }

      const cached = localStorage.getItem(key);
      const ts     = parseInt(localStorage.getItem(tsKey) || '0');
      if (cached && Date.now() - ts < TTL) { show(parseInt(cached)); return; }

      fetch('https://api.github.com/repos/stackopshq/ghostbit')
        .then(r => r.json())
        .then(d => {
          const n = d.stargazers_count;
          if (n == null) return;
          localStorage.setItem(key, n);
          localStorage.setItem(tsKey, Date.now());
          show(n);
        })
        .catch(() => {});
    })();
  </script>

  <script>
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const saved = localStorage.getItem('theme') || 'dark';
    html.setAttribute('data-theme', saved);

    toggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
