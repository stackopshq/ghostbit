<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ paste.id }} — raw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #282a36;
      color: #f8f8f2;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, 'Courier New', monospace;
      font-size: 0.875rem;
      line-height: 1.7;
      padding: 20px;
    }
    #content { white-space: pre; display: none; }
    #error { color: #ff5555; }
  </style>
</head>
<body>
  <pre id="content"></pre>
  <div id="error"></div>
</body>

<script id="paste-meta" type="application/json">{"id": {{ paste.id | tojson }}}</script>
<script src="/static/e2e.js?v={{ v }}"></script>
<script src="/static/raw.js?v={{ v }}" defer></script>
</html>
