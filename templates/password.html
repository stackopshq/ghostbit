{% extends "base.html" %}

{% block title %}Protected paste — Ghostbit{% endblock %}

{% block header_actions %}{% endblock %}

{% block page %}
<div class="password-page">
  <div class="password-card">
    <div class="lock-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Password required</h2>
    <span class="sub">This paste is protected. Enter the password to unlock it.</span>

    {% if error %}
    <div class="notice notice-error" style="text-align:left; margin-bottom: 16px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/{{ paste_id }}/unlock">
      <input type="hidden" name="key" value="{{ key }}">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password">
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Unlock
      </button>
    </form>
  </div>
</div>
{% endblock %}
