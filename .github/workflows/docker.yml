name: Docker

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "**.py"
      - "requirements.txt"
      - "static/**"
      - "templates/**"
      - "app/**"
      - ".github/workflows/docker.yml"
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to GHCR

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ── Vulnerability + secret + misconfig scan ───────────────────────────
      # Runs before the build so a CVE in requirements.txt or a leaked secret
      # blocks the push entirely. `ignore-unfixed` keeps the gate actionable:
      # only CVEs that *have* a fix available will fail the job.
      - name: Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln,secret,misconfig

      # ── Multi-platform builder (amd64 + arm64) ────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Login to registries ───────────────────────────────────────────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Tags & OCI labels ─────────────────────────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/stackopshq/ghostbit
            stackopshq/ghostbit
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=edge,branch=main
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Ghostbit
            org.opencontainers.image.description=Self-hosted, end-to-end encrypted paste service
            org.opencontainers.image.vendor=StackOps HQ
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.documentation=https://docs.ghostbit.dev

      # ── Build & push ──────────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
